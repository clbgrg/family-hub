name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Prepare Nuxt
        run: npx nuxt prepare

      - name: Run tests (unit + nuxt)
        run: npx vitest run --project unit --project nuxt

  build:

    runs-on: ubuntu-latest
    environment: Build
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Nuxt
        run: npm run build

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint