name: Publish image

# Builds a multi-arch (amd64 + arm64 for the Pi) image and pushes it to GHCR.
# Triggered ONLY by release tags (v*), so the :latest image — which Pis track
# via Watchtower — moves only when you cut a release, never on a stray commit.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. 2026.6.0)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  # Releases auto-deploy to every Pi via Watchtower, so don't publish an image
  # whose tests fail.
  test:
    name: Tests (release gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        # npm@11 matches the lockfile generator; Node 22's bundled npm 10.9.x
        # errors EBADPLATFORM on optional cross-platform native bindings.
        run: npm install -g npm@11 && npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Prepare Nuxt
        run: npx nuxt prepare

      - name: Run tests (unit + nuxt)
        run: npx vitest run --project unit --project nuxt

  build-and-push:
    name: Build and push to GHCR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
